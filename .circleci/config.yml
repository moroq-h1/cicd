version: 2.1

orbs:
  node: circleci/node@7.1.1
  codecov: codecov/codecov@6.0.0
  gcp-cli: circleci/gcp-cli@4.0.0

commands:
  setup-pnpm:
    description: "Install pnpm and project dependencies with store caching"
    steps:
      - run:
          name: Install pnpm
          command: sudo corepack enable && corepack prepare pnpm@10.30.3 --activate
      - run:
          name: Configure pnpm store dir
          command: pnpm config set store-dir ~/.pnpm-store
      - restore_cache:
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
jobs:
  javascript-tests:
    executor:
      name: node/default
      tag: '22.0'
    resource_class: large
    steps:
      - checkout
      - setup-pnpm
      - run:
          command: pnpm test
          name: Run Jest tests

workflows:
  run-tests:
    jobs:
      - javascript-tests